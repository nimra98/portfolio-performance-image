name: Update WinGet Package (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (z.B. 0.84.2)'
        required: true
      dry_run:
        description: 'Dry Run (Manifeste als Artefakt speichern, ABER KEIN PR an Microsoft senden)'
        type: boolean
        default: true

jobs:
  winget-pr:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download wingetcreate
        run: Invoke-WebRequest https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
      
      - name: Fetch GitHub Release Body
        id: get_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Holt die Release Notes direkt über die GitHub CLI von der Portfolio Performance Repository
          $ReleaseBody = gh release view ${{ github.event.inputs.version }} --repo portfolio-performance/portfolio --json body --jq '.body'
          
          # Speichere Release Notes in einer temporären Datei um multiline-Probleme als Env-Variable zu vermeiden
          $ReleaseBody | Out-File -FilePath release_body.txt -Encoding utf8
          
      - name: Update Manifests & Split Release Notes
        env:
          GITHUB_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          $Version = "${{ github.event.inputs.version }}"
          $InstallerUrl = "https://github.com/portfolio-performance/portfolio/releases/download/$Version/PortfolioPerformance-$Version-setup.exe"
          
          # 1. Manifeste generieren, aber noch nicht einreichen (-o speichert sie im Ordner 'manifests')
          # HINWEIS: Nullsoft Installer werden oft fälschlicherweise als x86 erkannt. 
          # Wir erzwingen hier 'x64' durch das Anhängen von '|x64' an die URL.
          .\wingetcreate.exe update buchen.portfolio -v $Version -u "$InstallerUrl|x64" -o .\manifests

          # 2. Release Body einlesen und am Trenner '---' aufteilen
          $ReleaseBody = Get-Content release_body.txt -Raw
          $Parts = $ReleaseBody -split '\s*---\s*'
          $GermanNotes = $Parts[0].Trim()
          $EnglishNotes = if ($Parts.Count -gt 1) { $Parts[1].Trim() } else { $GermanNotes }

          # Pfade zu den generierten Dateien finden
          $ManifestPath = (Get-ChildItem -Path .\manifests -Recurse -Filter "buchen.portfolio.yaml").Directory.FullName
          $DeFile = (Get-ChildItem -Path $ManifestPath -Filter "*de-DE.yaml").FullName
          $EnFile = (Get-ChildItem -Path $ManifestPath -Filter "*en-US.yaml").FullName

          function Update-ReleaseNotes($Content, $Notes, $Version) {
              $Notes = $Notes.Trim()
              $NotesFormatted = $Notes -replace '\r?\n', "`r`n  "
              $Url = "https://github.com/portfolio-performance/portfolio/releases/tag/$Version"
              
              # Der zu injizierende Block
              $Injection = "ReleaseNotesUrl: $Url`r`nReleaseNotes: |-`r`n  $NotesFormatted"
              
              # Bereinige das Feld falls es existiert, damit wir es nicht doppelt haben
              $Content = $Content -replace '(?ms)^ReleaseNotesUrl:.*?(?=\r?\n\w+:|$)', ''
              $Content = $Content -replace '(?ms)^ReleaseNotes:.*?(?=\r?\n\w+:|$)', ''
              
              # Füge es vor ManifestType ein (ManifestType steht garantiert immer ganz unten)
              return $Content -replace '(?m)^ManifestType:', "$Injection`r`nManifestType:"
          }

          # 3. Deutsche Release Notes in de-DE.yaml patchen
          if ($DeFile -and (Test-Path $DeFile)) {
              $DeContent = Get-Content $DeFile -Raw
              $DeContent = Update-ReleaseNotes $DeContent $GermanNotes $Version
              Set-Content -Path $DeFile -Value $DeContent -NoNewline
          } else {
              Write-Warning "Deutsch-Manifest nicht gefunden!"
          }

          # 4. Englische Release Notes in en-US.yaml patchen
          if ($EnFile -and (Test-Path $EnFile)) {
              $EnContent = Get-Content $EnFile -Raw
              $EnContent = Update-ReleaseNotes $EnContent $EnglishNotes $Version
              Set-Content -Path $EnFile -Value $EnContent -NoNewline
          } else {
              Write-Warning "Englisch-Manifest nicht gefunden!"
          }
          
      - name: Upload Manifests as Artifact (for Dry Run Inspection)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: winget-manifests-${{ github.event.inputs.version }}
          path: manifests/

      - name: Submit PR to Microsoft
        if: ${{ github.event.inputs.dry_run == 'false' }}
        env:
          GITHUB_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          $Version = "${{ github.event.inputs.version }}"
          $ManifestPath = (Get-ChildItem -Path .\manifests -Recurse -Filter "buchen.portfolio.yaml").Directory.FullName
          
          # Finale PR einreichen und Output erfassen! 
          $SubmitOutput = .\wingetcreate.exe submit --prtitle "New version: buchen.portfolio version $Version" $ManifestPath -t $env:GITHUB_TOKEN 2>&1
          
          # Output im Log ausgeben
          $SubmitOutput | Write-Host
          
          # Output in die GitHub Actions Zusammenfassung (Step Summary) schreiben, damit der Link sofort sichtbar ist
          "### WinGet PR Submit Result" >> $env:GITHUB_STEP_SUMMARY
          "```text" >> $env:GITHUB_STEP_SUMMARY
          $SubmitOutput >> $env:GITHUB_STEP_SUMMARY
          "```" >> $env:GITHUB_STEP_SUMMARY
