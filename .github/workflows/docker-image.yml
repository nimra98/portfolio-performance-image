name: Build and Publish Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version für das Docker Image'
        required: true
      latest:
        description: 'Als latest taggen?'
        required: true
        type: boolean
        default: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ github.event.inputs.version }}
      latest: ${{ github.event.inputs.latest }}
    steps:
      - name: Set variables
        id: set_vars
        run: |
          echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          echo "latest=${{ github.event.inputs.latest }}" >> $GITHUB_OUTPUT

  build-amd64:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        packaging: [pponly, nextcloud, firefox, firefox-nextcloud]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push AMD64 image
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          PACKAGING="${{ matrix.packaging }}"
          IMAGE="nimra98/portfolio-performance"
          
          # Baue das AMD64 Image als reines Docker Image (kein Manifest)
          docker buildx build \
            --build-arg VERSION=${VERSION} \
            --build-arg PACKAGING=${PACKAGING} \
            --platform linux/amd64 \
            --output "type=docker" \
            --tag ${IMAGE}:${PACKAGING}-${VERSION}-amd64 \
            --provenance=false \
            .
          docker push ${IMAGE}:${PACKAGING}-${VERSION}-amd64

  build-arm64:
    needs: prepare
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        packaging: [pponly, nextcloud, firefox, firefox-nextcloud]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ARM64 image
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          PACKAGING="${{ matrix.packaging }}"
          IMAGE="nimra98/portfolio-performance"
          
          # Baue das ARM64 Image als reines Docker Image
          docker buildx build \
            --build-arg VERSION=${VERSION} \
            --build-arg PACKAGING=${PACKAGING} \
            --platform linux/arm64 \
            --output "type=docker" \
            --tag ${IMAGE}:${PACKAGING}-${VERSION}-arm64 \
            --provenance=false \
            .
          docker push ${IMAGE}:${PACKAGING}-${VERSION}-arm64

  create-manifests:
    needs: [prepare, build-amd64, build-arm64]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        packaging: [pponly, nextcloud, firefox, firefox-nextcloud]
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          PACKAGING="${{ matrix.packaging }}"
          LATEST="${{ needs.prepare.outputs.latest }}"
          IMAGE="nimra98/portfolio-performance"
          
          # Aktiviere experimentelle Docker CLI-Features
          export DOCKER_CLI_EXPERIMENTAL=enabled
          
          # Erstelle und pushe das versionierte Multi-Arch-Manifest
          docker manifest create ${IMAGE}:${PACKAGING}-${VERSION} \
            ${IMAGE}:${PACKAGING}-${VERSION}-amd64 \
            ${IMAGE}:${PACKAGING}-${VERSION}-arm64
          
          docker manifest push ${IMAGE}:${PACKAGING}-${VERSION}
          
          # Falls LATEST true ist, auch als latest taggen
          if [ "${LATEST}" = "true" ]; then
            docker manifest create ${IMAGE}:${PACKAGING} \
              ${IMAGE}:${PACKAGING}-${VERSION}-amd64 \
              ${IMAGE}:${PACKAGING}-${VERSION}-arm64
            docker manifest push ${IMAGE}:${PACKAGING}
          fi

  create-release:
    needs: [prepare, create-manifests]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: Release ${{ needs.prepare.outputs.version }}
          body: |
            Docker images for version ${{ needs.prepare.outputs.version }} have been successfully published to Docker Hub.
            
            Images available:
            - `nimra98/portfolio-performance:pponly-${{ needs.prepare.outputs.version }}`
            - `nimra98/portfolio-performance:nextcloud-${{ needs.prepare.outputs.version }}`
            - `nimra98/portfolio-performance:firefox-${{ needs.prepare.outputs.version }}`
            - `nimra98/portfolio-performance:firefox-nextcloud-${{ needs.prepare.outputs.version }}`
          draft: false
          prerelease: false
          generate_release_notes: true
