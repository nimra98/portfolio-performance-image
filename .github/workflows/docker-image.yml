name: Build and Publish Docker Image

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version für das Docker Image'
        required: true
      latest:
        description: 'Als latest taggen?'
        required: true
        type: boolean
        default: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ github.event.inputs.version }}
      latest: ${{ github.event.inputs.latest }}
    steps:
      - name: Set variables
        id: set_vars
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_LATEST: ${{ github.event.inputs.latest }}
        run: |
          echo "version=$INPUT_VERSION" >> $GITHUB_OUTPUT
          echo "latest=$INPUT_LATEST" >> $GITHUB_OUTPUT

  build-amd64:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      matrix:
        packaging: [pponly, nextcloud, firefox, firefox-nextcloud]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push AMD64 image
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          PACKAGING: ${{ matrix.packaging }}
        run: |
          IMAGE="nimra98/portfolio-performance"
          
          # Baue das AMD64 Image als reines Docker Image (kein Manifest)
          docker buildx build \
            --build-arg VERSION=${VERSION} \
            --build-arg PACKAGING=${PACKAGING} \
            --platform linux/amd64 \
            --output "type=docker" \
            --tag ${IMAGE}:${PACKAGING}-${VERSION}-amd64 \
            --provenance=false \
            .
          docker push ${IMAGE}:${PACKAGING}-${VERSION}-amd64

  build-arm64:
    needs: prepare
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    strategy:
      matrix:
        packaging: [pponly, nextcloud, firefox, firefox-nextcloud]
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ARM64 image
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          PACKAGING: ${{ matrix.packaging }}
        run: |
          IMAGE="nimra98/portfolio-performance"
          
          # Baue das ARM64 Image als reines Docker Image
          docker buildx build \
            --build-arg VERSION=${VERSION} \
            --build-arg PACKAGING=${PACKAGING} \
            --platform linux/arm64 \
            --output "type=docker" \
            --tag ${IMAGE}:${PACKAGING}-${VERSION}-arm64 \
            --provenance=false \
            .
          docker push ${IMAGE}:${PACKAGING}-${VERSION}-arm64

  create-manifests:
    needs: [prepare, build-amd64, build-arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        packaging: [pponly, nextcloud, firefox, firefox-nextcloud]
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          PACKAGING: ${{ matrix.packaging }}
          LATEST: ${{ needs.prepare.outputs.latest }}
        run: |
          IMAGE="nimra98/portfolio-performance"
          
          # Aktiviere experimentelle Docker CLI-Features
          export DOCKER_CLI_EXPERIMENTAL=enabled
          
          # Erstelle und pushe das versionierte Multi-Arch-Manifest
          docker manifest create ${IMAGE}:${PACKAGING}-${VERSION} \
            ${IMAGE}:${PACKAGING}-${VERSION}-amd64 \
            ${IMAGE}:${PACKAGING}-${VERSION}-arm64
          
          docker manifest push ${IMAGE}:${PACKAGING}-${VERSION}
          
          # Falls LATEST true ist, auch als latest taggen
          if [ "${LATEST}" = "true" ]; then
            docker manifest create ${IMAGE}:${PACKAGING} \
              ${IMAGE}:${PACKAGING}-${VERSION}-amd64 \
              ${IMAGE}:${PACKAGING}-${VERSION}-arm64
            docker manifest push ${IMAGE}:${PACKAGING}
          fi

  create-release:
    needs: [prepare, create-manifests]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: Release ${{ needs.prepare.outputs.version }}
          body: |
            Docker images for version ${{ needs.prepare.outputs.version }} have been successfully published to Docker Hub.
            
            ### Specific Version Images:
            - [`nimra98/portfolio-performance:pponly-${{ needs.prepare.outputs.version }}`](https://hub.docker.com/r/nimra98/portfolio-performance/tags?name=pponly-${{ needs.prepare.outputs.version }})
            - [`nimra98/portfolio-performance:nextcloud-${{ needs.prepare.outputs.version }}`](https://hub.docker.com/r/nimra98/portfolio-performance/tags?name=nextcloud-${{ needs.prepare.outputs.version }})
            - [`nimra98/portfolio-performance:firefox-${{ needs.prepare.outputs.version }}`](https://hub.docker.com/r/nimra98/portfolio-performance/tags?name=firefox-${{ needs.prepare.outputs.version }})
            - [`nimra98/portfolio-performance:firefox-nextcloud-${{ needs.prepare.outputs.version }}`](https://hub.docker.com/r/nimra98/portfolio-performance/tags?name=firefox-nextcloud-${{ needs.prepare.outputs.version }})
            
            ### General Variants:
            The following general tags are also available and point to the latest stable version of their respective variant:
            - [`nimra98/portfolio-performance:pponly`](https://hub.docker.com/r/nimra98/portfolio-performance/tags?name=pponly)
            - [`nimra98/portfolio-performance:nextcloud`](https://hub.docker.com/r/nimra98/portfolio-performance/tags?name=nextcloud)
            - [`nimra98/portfolio-performance:firefox`](https://hub.docker.com/r/nimra98/portfolio-performance/tags?name=firefox)
            - [`nimra98/portfolio-performance:firefox-nextcloud`](https://hub.docker.com/r/nimra98/portfolio-performance/tags?name=firefox-nextcloud)
          draft: false
          prerelease: false
          generate_release_notes: true
